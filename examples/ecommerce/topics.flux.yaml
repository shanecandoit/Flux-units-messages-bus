topics:

  commerce.cart.add:
    payload:
      sku:   string(32) not null
      price: f32        not null
      qty:   u32        not null
    cascade_budget: 5

  commerce.cart.updated:
    payload:
      total:      f32 not null
      item_count: u32 not null

  commerce.cart.coupon_applied:
    payload:
      code: string(16) not null
      pct:  f32        not null

  commerce.checkout.submit:
    payload:
      cart_id: string(64) not null
    cascade_budget: 15

  commerce.checkout.complete:
    payload:
      total: f32 not null
