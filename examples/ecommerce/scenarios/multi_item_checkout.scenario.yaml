name: Multi-item cart then checkout
description: |
  Customer adds two different items then checks out without a promo code.
  Demonstrates subtotal accumulation, the cart.updated cascade message,
  and that totals reset to zero after checkout.

steps:

  - description: Add blue widget ($9.99 × 1)
    inject:
      topic: commerce.cart.add
      sku: widget-blue
      price: 9.99
      qty: 1
    expect:
      - field: cart.totals.subtotal
        op: equals
        value: 9.99
      - field: cart.totals.subtotal
        op: greater_than
        value: 0
    expect_message:
      - topic: commerce.cart.updated
        field: item_count
        op: equals
        value: 1

  - description: Add red widget ($14.99 × 2)
    inject:
      topic: commerce.cart.add
      sku: widget-red
      price: 14.99
      qty: 2
    expect:
      - field: cart.totals.subtotal
        op: equals
        value: 39.97
    must_not:
      - field: cart.totals.subtotal
        op: equals
        value: 9.99
    expect_message:
      - topic: commerce.cart.updated
        field: item_count
        op: equals
        value: 2

  - description: Customer checks out (no coupon)
    inject:
      topic: commerce.checkout.submit
      cart_id: cart_multi_001
    expect:
      - field: cart.totals.subtotal
        op: equals
        value: 0
      - field: cart.totals.coupon
        op: not_exists
    expect_message:
      - topic: commerce.checkout.complete
        field: total
        op: greater_than
        value: 0
