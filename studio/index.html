<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flux Studio — Scenario Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">Flux <span>Studio</span></div>
    <div class="header-tabs">
      <button class="tab-btn active" title="BA Scenario Builder">Scenario Builder</button>
      <button class="tab-btn" title="Coming in Phase 6" disabled style="opacity:0.4" title="Coming in Phase 6">Rule Editor</button>
      <button class="tab-btn" title="Coming in Phase 4" disabled style="opacity:0.4" title="Coming in Phase 4">Timeline</button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Scenarios</span>
      <div style="display:flex;gap:6px">
        <button class="btn btn-secondary btn-icon" onclick="importYamlFile()" title="Import YAML">↑</button>
        <button class="btn btn-primary btn-icon" onclick="addScenario()" title="New scenario">+</button>
      </div>
    </div>
    <div class="scenario-list" id="scenario-list"></div>
    <div style="padding:12px;border-top:1px solid var(--border)">
      <button class="add-link" onclick="addCustomTopic()" style="font-size:12px">+ Register custom topic</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main-content">
    <div class="main-toolbar">
      <span style="color:var(--text-dim);font-size:13px">Select or create a scenario</span>
    </div>
    <div class="steps-container">
      <div class="empty-state">
        <h3>Welcome to Flux Studio</h3>
        <p>Create scenarios that describe how your system should behave.<br>
        Each step injects a message and asserts on the resulting state.</p>
      </div>
    </div>
  </main>

  <!-- Detail / YAML preview -->
  <aside class="detail">
    <div class="detail-header">YAML Preview</div>
    <div class="detail-body" id="detail-body">
      <p style="color:var(--text-dim);font-size:13px">Select a scenario to see its YAML.</p>
    </div>
    <div class="detail-footer">
      <button class="btn btn-secondary" onclick="copyYaml()">Copy YAML</button>
      <button class="btn btn-primary" onclick="exportYaml()">Download .scenario.yaml</button>
    </div>
  </aside>

</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
